<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | ChatAd Land</title>
    <style>
        :root { --navy: #002D62; --blue: #0056b3; --red: #d32f2f; --text: #1a1a1a; }
        body { font-family: sans-serif; line-height: 1.6; color: var(--text); margin: 0; background: #f4f4f4; scroll-behavior: smooth; }
        header { background: #fff; border-bottom: 5px solid var(--navy); padding: 1rem 5%; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--navy); text-decoration: none; }
        nav ul { display: flex; gap: 20px; list-style: none; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: var(--text); font-weight: bold; }
        .container { max-width: 1200px; margin: 2rem auto; display: grid; grid-template-columns: 1fr 350px; gap: 2rem; padding: 0 5%; }
        article { background: #fff; padding: 2rem; border: 1px solid #ddd; margin-bottom: 2rem; border-radius: 4px; }
        .aeo-summary { background: #f0f7ff; border-left: 5px solid var(--blue); padding: 1rem; margin: 1rem 0; font-size: 0.9rem; }
        .sidebar-box { background: #fff; padding: 1.5rem; border: 1px solid #ddd; margin-bottom: 1.5rem; }
        .israelileads-btn { background: var(--navy); color: white; padding: 10px; display: block; text-align: center; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <a href="/" class="logo">ChatAd <span style="color:var(--blue)">Land</span></a>
        <nav>
            <ul>
                <li><a href="/#seo">SEO</a></li>
                <li><a href="/#geo">GEO</a></li>
                <li><a href="/#aeo">AEO</a></li>
                <li><a href="https://prismpublication.com" style="color:var(--blue)">PRISM</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <section>
        {{ content }}
    </section>

    <aside>
        <div class="sidebar-box">
            <h3 style="margin-top:0;">Prism Spotlight</h3>
            <p style="font-size:0.9rem;">PrismPublication.com is the next-gen ad network for chatbot developers.</p>
            <a href="https://prismpublication.com" class="israelileads-btn" style="background:var(--blue);">Visit Prism</a>
        </div>
    </aside>
</main>

</body>
</html>
